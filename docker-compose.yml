version: '3.8'

services:
  # Metadata Database (Postgres)
  postgres:
    image: postgres:16-alpine
    container_name: nas-postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nas_supapp

  # Object Storage (S3 Compatible)
  minio:
    image: minio/minio
    container_name: nas-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"

  # Redis (Optional)
  redis:
    image: redis:alpine
    container_name: nas-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  data:
