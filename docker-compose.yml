version: '3.8'

services:
  # Metadata Database
  mongo:
    image: mongo:latest
    container_name: nas-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  # Object Storage (S3 Compatible)
  minio:
    image: minio/minio
    container_name: nas-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"

  # Redis (Optional, for Event Bus/Cache later)
  redis:
    image: redis:alpine
    container_name: nas-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  data:
